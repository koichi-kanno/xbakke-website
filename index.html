<!DOCTYPE html>
<html lang="en" id="html-lang">
<head>

    <style>
        :root {
            --bg: #05060b;
            --bg-elevated: #101320;
            --accent: #00a4ff; 
            --accent-soft: rgba(0, 164, 255, 0.16);
            --accent-strong: #23b3ff;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border-subtle: rgba(148, 163, 184, 0.25);
            --radius-lg: 18px;
            --radius-pill: 999px;
            --shadow-soft: 0 24px 80px rgba(0, 0, 0, 0.85);
            --container-max: 1120px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);

            text-rendering: optimizeLegibility;

            display: flex;
            flex-direction: column;
        }

            margin: 0 auto;
            padding: 20px 20px 64px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
            background: rgba(5, 6, 11, 0.8);
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px 10px;
            max-width: var(--container-max);
            margin: 0 auto;
        }

        .brand-text-main {
            font-weight: 600;
            letter-spacing: 0.05em;
            font-size: 1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.18s ease;
        }
        
        .nav-links a:hover {
            color: var(--text);
        }

        .lang-switcher {
            margin-left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .lang-switcher a {
            cursor: pointer;
            text-decoration: none;
        }
        .lang-switcher a.active {
            color: var(--accent-strong);
        }

        main {
            flex: 1;
            padding-top: 60px;
        }

        .hero {
            text-align: center;
        }

        .hero-title {
            font-size: clamp(2.8rem, 4vw + 1rem, 4rem);
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin: 0 0 16px;
        }
        
        .hero-title span.highlight {
            background: linear-gradient(120deg, var(--accent-strong), var(--accent));
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-lead {
            margin: 0 auto 32px;
            max-width: 48rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn-primary {
            border-radius: var(--radius-pill);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            color: #fff;
            background: var(--accent);
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--accent-strong);
        }
        
        .btn-secondary {
            border-radius: var(--radius-pill);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            color: var(--text);
            background: transparent;
            text-decoration: none;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: var(--text-muted);
        }

        .section {
            padding: 80px 0;
            border-top: 1px solid var(--border-subtle);
        }
        
        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin: 0 0 48px;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            border-radius: var(--radius-lg);
            padding: 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            margin: 0 0 12px;
            color: var(--accent-strong);
        }

        .card-description {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
        
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 32px 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const langLinks = document.querySelectorAll('.lang-link');
            const translatableElements = document.querySelectorAll('[data-en]');
            const htmlTag = document.getElementById('html-lang');

            const setLanguage = (lang) => {
                translatableElements.forEach(el => {
                    const text = el.getAttribute(`data-${lang}`);
                    if (text) {
                        // For elements that might contain HTML, like the hero title
                        if (el.hasAttribute('data-en') && el.getAttribute('data-en').includes('<span')) {
                            el.innerHTML = text;
                        } else {
                            el.textContent = text;
                        }
                    }
                    // Handle image alt attributes
                    const altText = el.getAttribute(`data-${lang}-alt`);
                    if (altText) {
                        el.setAttribute('alt', altText);
                    }
                });

                htmlTag.setAttribute('lang', lang);
                localStorage.setItem('language', lang);

                // Update active link style
                langLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('data-lang') === lang) {
                        link.classList.add('active');
                    }
                });
            };

            langLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const lang = link.getAttribute('data-lang');
                    setLanguage(lang);
                });
            });

            // Set initial language from localStorage or default to English
            const savedLang = localStorage.getItem('language') || 'ja';
            setLanguage(savedLang);
        });
    </script>
